{% extends 'base.html' %}
{% block title %}Profile | CampusLoop{% endblock %}
{% block content %}
<section class="panel">
    <div class="section-head">
        <div>
            <h1>{{ profile_user.name }}</h1>
            <p>{{ profile_user.email }}</p>
        </div>
        <div class="trust-chip {{ profile_user.trust_level|trust_badge_class }}">
            {{ profile_user.trust_level }} | Score {{ profile_user.trust_score }}
        </div>
    </div>

    <form method="post" class="form-grid">
        <label>Name
            <input type="text" name="name" value="{{ profile_user.name }}" required>
        </label>
        <label>Phone
            <input type="text" name="phone" value="{{ profile_user.phone }}" required>
        </label>
        <label>Role
            <input type="text" value="{{ profile_user.role }}" disabled>
        </label>
        <label>Verified seller
            <input type="text" value="{{ 'Yes' if profile_user.is_verified_seller else 'No' }}" disabled>
        </label>
        <button class="button" type="submit">Update profile</button>
    </form>
</section>
{% endblock %}
