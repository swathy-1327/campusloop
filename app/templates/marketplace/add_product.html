{% extends "base.html" %}
{% block title %}Add Product | CampusLoop{% endblock %}
{% block content %}
<section class="panel form-panel">
    <h1>Add a product</h1>
    <p class="muted">Verified sellers can list items for sale or rent. Paste an image link for quick demos.</p>
    <form method="post" class="form-grid">
        <label>Product title
            <input type="text" name="title" required>
        </label>
        <label>Category
            <select name="category">
                <option>Books</option>
                <option>Electronics</option>
                <option>Cycles</option>
                <option>Lab Items</option>
                <option>Hostel Items</option>
            </select>
        </label>
        <label>Use type
            <input type="text" name="use_type" placeholder="Semester use, daily commute, hostel utility" required>
        </label>
        <label>Price<input type="number" step="0.01" name="price" required></label>
        <label>Condition<input type="text" name="item_condition" required></label>
        <label>Mode
            <select name="mode">
                <option value="sell">Sell</option>
                <option value="rent">Rent</option>
            </select>
        </label>
        <label>Image URL<input type="url" name="image_url"></label>
        <label class="full-width">Description<textarea name="description" rows="5" required></textarea></label>
        <button class="button" type="submit">Publish listing</button>
    </form>
</section>
{% endblock %}
