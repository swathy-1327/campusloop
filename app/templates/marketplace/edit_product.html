{% extends "base.html" %}
{% block title %}Edit Product | CampusLoop{% endblock %}
{% block content %}
<section class="panel form-panel">
    <div class="section-head">
        <div>
            <h1>Edit product</h1>
            <p>Update product name, tags, category, pricing, and listing details.</p>
        </div>
        <a class="button button-secondary" href="{{ url_for('marketplace.my_listings') }}">Back to listings</a>
    </div>
    <form method="post" class="form-grid">
        <label>Product title
            <input type="text" name="title" value="{{ product.title }}" required>
        </label>
        <label>Category
            <select name="category">
                <option {% if product.category == 'Books' %}selected{% endif %}>Books</option>
                <option {% if product.category == 'Electronics' %}selected{% endif %}>Electronics</option>
                <option {% if product.category == 'Cycles' %}selected{% endif %}>Cycles</option>
                <option {% if product.category == 'Lab Items' %}selected{% endif %}>Lab Items</option>
                <option {% if product.category == 'Hostel Items' %}selected{% endif %}>Hostel Items</option>
            </select>
        </label>
        <label>Use type / tag
            <input type="text" name="use_type" value="{{ product.use_type }}" required>
        </label>
        <label>Price<input type="number" step="0.01" name="price" value="{{ product.price }}" required></label>
        <label>Condition<input type="text" name="item_condition" value="{{ product.item_condition }}" required></label>
        <label>Mode
            <select name="mode">
                <option value="sell" {% if product.mode == 'sell' %}selected{% endif %}>Sell</option>
                <option value="rent" {% if product.mode == 'rent' %}selected{% endif %}>Rent</option>
            </select>
        </label>
        <label>Image URL<input type="url" name="image_url" value="{{ product.image_url or '' }}"></label>
        <label class="full-width">Description<textarea name="description" rows="5" required>{{ product.description }}</textarea></label>
        <button class="button" type="submit">Save changes</button>
    </form>
</section>
{% endblock %}
