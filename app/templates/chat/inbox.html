{% extends "base.html" %}
{% block title %}Inbox | CampusLoop{% endblock %}
{% block content %}
<section class="panel">
    <h1>Inbox</h1>
    {% for thread in threads %}
        <div class="item-row">
            <div>
                <strong>{{ thread.product.title }}</strong>
                <p class="muted">Buyer: {{ thread.buyer.name }} | Seller: {{ thread.seller.name }}</p>
            </div>
            <a class="button button-secondary" href="{{ url_for('chat.thread_detail', thread_id=thread.id) }}">Open chat</a>
        </div>
    {% else %}
        <p class="muted">No conversations yet.</p>
    {% endfor %}
</section>
{% endblock %}
