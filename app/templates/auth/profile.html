{% extends "base.html" %}
{% block title %}Profile | CampusLoop{% endblock %}
{% block content %}
<section class="panel">
    <div class="section-head">
        <div>
            <h1>{{ current_user.name }}</h1>
            <p>{{ current_user.email }}</p>
        </div>
        <div class="trust-chip badge-blue">
            {{ current_user.trust_level }} | Score {{ current_user.trust_score }}
        </div>
    </div>

    <form method="post" class="form-grid">
        <label>Name
            <input type="text" name="name" value="{{ current_user.name }}" required>
        </label>
        <label>Email
            <input type="email" name="email" value="{{ current_user.email }}" required>
        </label>
        <label>Phone
            <input type="text" name="phone" value="{{ current_user.phone }}" required>
        </label>
        <label>New Password
            <input type="password" name="password" placeholder="Leave blank to keep current password">
        </label>
        <label>Role
            <input type="text" value="{{ current_user.role }}" disabled>
        </label>
        <label>Verified seller
            <input type="text" value="{{ 'Yes' if current_user.is_verified_seller else 'No' }}" disabled>
        </label>
        <button class="button" type="submit">Update profile</button>
    </form>
</section>
{% endblock %}
