{% extends "base.html" %}
{% block title %}Rent Request | CampusLoop{% endblock %}
{% block content %}
<section class="panel form-panel">
    <h1>Post a rental request</h1>
    <form method="post" class="form-grid">
        <label>Product needed
            <input type="text" name="product_name" required>
        </label>
        <label>Category
            <input type="text" name="category" required>
        </label>
        <label>Duration
            <input type="text" name="duration" placeholder="2 weeks, 1 semester" required>
        </label>
        <label>Budget
            <input type="number" step="0.01" name="budget" required>
        </label>
        <label class="full-width">Notes
            <textarea name="note" rows="4"></textarea>
        </label>
        <button class="button" type="submit">Post request</button>
    </form>
</section>
{% endblock %}
