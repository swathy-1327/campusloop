{% extends "base.html" %}
{% block title %}Unavailable Item Request | CampusLoop{% endblock %}
{% block content %}
<section class="panel form-panel">
    <h1>Request an unavailable item</h1>
    <form method="post" class="form-grid">
        <label>Product needed
            <input type="text" name="product_name" required>
        </label>
        <label>Category
            <input type="text" name="category" required>
        </label>
        <label>Budget
            <input type="number" step="0.01" name="budget" required>
        </label>
        <label class="full-width">Description
            <textarea name="description" rows="4"></textarea>
        </label>
        <button class="button" type="submit">Post demand</button>
    </form>
</section>
{% endblock %}
